global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ecommerce-api
    static_configs:
      - targets:
          - ecommerce-api:8080
    metrics_path: /metrics

  - job_name: ecommerce-frontend
    static_configs:
      - targets:
          - frontend:4000
    metrics_path: /metrics

  - job_name: alita-agent
    static_configs:
      - targets:
          - alita-agent:8001
    metrics_path: /metrics
